<body>

  <!-- PROFILE SETUP MODAL -->

<div id="setupOverlay" class="setup-overlay">

<div class="setup-card">

<h2 class="setup-title">Set up your profile</h2>

<p class="setup-subtitle">
Let people in your circle know who you are
</p>

<div class="avatar-preview">🧑‍💻</div>

<div class="avatar-row">

<span class="avatar-option selected">🧑‍💻</span>

<span class="avatar-option">🧑‍🎓</span>

<span class="avatar-option">👨‍⚕️</span>
<span class="avatar-option">👩‍🎨</span>

<span class="avatar-option">👨‍🏫</span>

class="setup-input"
placeholder="Your name"
>

placeholder="Short bio (optional)"
maxlength="160"
></textarea>

Continue
</button>

</div>

<div id="app">


<div class="creator">

<h1>Create Post</h1>
<input id="caption" placeholder="Write a caption">

<input type="file" id="photo" hidden>
<button id="choosePhoto">Choose Photo</button>

<span id="fileName">No file selected</span>

<button id="createPost">Create Post</button>

</div>


<div class="feed-header">
  <div class="active-indicator">👥</div>
  <span id="activeCount">9 people active in your circle</span>
</div>

<label style="color:white;">Radius:</label>

<input
type="range"
id="radiusInput"
min="1"
max="50"
value="10"
step="1"
>

<span id="radiusValue" style="color:white;">10</span> km


<div id="feed"></div>


<script type="module">

import { createPost } from "./createPost.js";
import { getNearbyPosts } from "./getNearbyPosts.js";
import { likePost } from "./likePost.js";
import { getUser } from "./getUser.js";
import { createComment } from "./createComment.js";
import { auth, db } from "./firebase.js";
import { getComments } from "./getComments.js";
import { deletePost } from "./deletePost.js";
import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

onAuthStateChanged(auth, (user) => {

  if (!user) {
    window.location.href = "login.html";
  }

});



const createBtn = document.getElementById("createPost");
const feed = document.getElementById("feed");
const captionInput = document.getElementById("caption");
const photoInput = document.getElementById("photo");
const chooseBtn = document.getElementById("choosePhoto");
const fileName = document.getElementById("fileName");
const radiusInput = document.getElementById("radiusInput");
const radiusValue = document.getElementById("radiusValue");

chooseBtn.onclick = () => {
photoInput.click();
};

photoInput.onchange = () => {
if (photoInput.files.length > 0) {
fileName.innerText = photoInput.files[0].name;
}
};


createBtn.onclick = async () => {

try {

const caption = captionInput.value;
const file = photoInput.files[0];

let imageUrl = "none";
let mediaType = "none";

if (file) {

const formData = new FormData();
formData.append("file", file);
formData.append("upload_preset", "circle_upload");

const response = await fetch(
"https://api.cloudinary.com/v1_1/dk17e4ugi/image/upload",
{
method: "POST",
body: formData
}
);

const data = await response.json();

if (data.secure_url) {
imageUrl = data.secure_url;
mediaType = "image";
}

}

navigator.geolocation.getCurrentPosition(async (position) => {

const lat = position.coords.latitude;
const lon = position.coords.longitude;

await createPost(
caption,
imageUrl,
mediaType,
lat,
lon,
"test_user"
);

});

alert("Post created!");
loadPosts();

} catch (error) {

console.error("POST ERROR:", error);
alert("Post failed. Check console.");

}

};


function timeAgo(timestamp){

const now = Date.now();
const diff = now - timestamp;

const minutes = Math.floor(diff/60000);
const hours = Math.floor(diff/3600000);
const days = Math.floor(diff/86400000);

if(minutes < 1) return "just now";
if(minutes < 60) return minutes+"m ago";
if(hours < 24) return hours+"h ago";
return days+"d ago";

}


function distanceKm(lat1, lon1, lat2, lon2){

const R = 6371;

const dLat = (lat2-lat1)*Math.PI/180;
const dLon = (lon2-lon1)*Math.PI/180;

const a =
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2);

const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}


async function loadPosts(){

navigator.geolocation.getCurrentPosition(async(position)=>{

const userLat = position.coords.latitude;
const userLon = position.coords.longitude;

const radius = parseFloat(radiusInput.value)||10;

const posts = await getNearbyPosts(userLat,userLon,radius);

feed.innerHTML="";

posts.forEach(async(post)=>{

const div = document.createElement("div");

const dist = distanceKm(userLat,userLon,post.latitude,post.longitude);

if(dist>radius) return;

const user = await getUser(post.userId);
const username = user?user.username:"Unknown";

div.className="post";

div.innerHTML=`

<div class="post-card">

<div class="post-top">

<div class="avatar">
<img class="profile-pic" src="${user?.profilePictureUrl || 'https://via.placeholder.com/40'}">
</div>

<div class="post-info">
<div class="username" data-uid="${post.userId}">${username}</div>
<div class="post-time">${timeAgo(post.timestamp)}</div>
</div>

<div class="distance-badge">
${dist.toFixed(1)} km
</div>

<div class="post-menu">
  <span class="menu-btn">⋯</span>

  <div class="menu-dropdown">
    <div class="delete-option">Delete</div>
  </div>
</div>

</div>

${post.mediaType==="image"?`<img class="post-image" src="${post.mediaUrl}">`:""}

<div class="post-text">${post.text}</div>

<div class="actions">

<span class="heart like-btn" data-id="${post.id}">❤️</span>
<span class="likes">${post.likesCount}</span>

<span class="comment-toggle" style="margin-left:12px;cursor:pointer;">💬</span>
<span class="comment-count">0</span>

</div>

<div class="comment-box" style="display:none;margin-top:10px;">
<input class="comment-input" placeholder="Write a comment..." style="width:70%;">
<button class="comment-btn">Post</button>
</div>

</div>

`;

feed.appendChild(div);


const menuBtn = div.querySelector(".menu-btn");
const menuDropdown = div.querySelector(".menu-dropdown");

menuBtn.onclick = () => {

  if (menuDropdown.style.display === "block") {
    menuDropdown.style.display = "none";
  } else {
    menuDropdown.style.display = "block";
  }

};

const postMenu = div.querySelector(".post-menu");

if (auth.currentUser?.uid !== post.userId) {
  postMenu.style.display = "none";
}

const deleteOption = div.querySelector(".delete-option");

deleteOption.onclick = async () => {

  const confirmDelete = confirm("Delete this post?");
  if (!confirmDelete) return;

  await deletePost(post.id);

  div.remove();

};


// LOAD COMMENTS
const comments = await getComments(post.id);

const commentCount = div.querySelector(".comment-count");

commentCount.innerText = comments.length;

for (const comment of comments) {

  const commenter = await getUser(comment.userId);

  const c = document.createElement("div");
  c.style.fontSize = "14px";
  c.style.marginTop = "6px";

  const name = commenter ? commenter.username : "Unknown";

  c.innerHTML = "<b>" + name + "</b>: " + comment.text;

  div.appendChild(c);

}

// USERNAME CLICK → PROFILE
const usernameEl = div.querySelector(".username");
usernameEl.onclick = () => {
  window.location.href = `profile.html?uid=${post.userId}`;
};


// LIKE BUTTON
const likeBtn = div.querySelector(".like-btn");
const likesText = div.querySelector(".likes");

likeBtn.onclick = async () => {

  post.likesCount++;

  likesText.innerText = post.likesCount;

  await likePost(post.id);

};


// COMMENT TOGGLE
const commentToggle = div.querySelector(".comment-toggle");
const commentBox = div.querySelector(".comment-box");

commentToggle.onclick = () => {

  if (commentBox.style.display === "none") {
    commentBox.style.display = "block";
  } else {
    commentBox.style.display = "none";
  }

};


// POST COMMENT
const commentBtn = div.querySelector(".comment-btn");
const commentInput = div.querySelector(".comment-input");

commentBtn.onclick = async () => {

  const text = commentInput.value.trim();
  if (!text) return;

  const user = auth.currentUser;

  if (!user) {
    alert("Please login first");
    return;
  }

  await createComment(post.id, user.uid, text);

  commentInput.value = "";

};


// DELETE POST
const deleteBtn = div.querySelector(".delete-btn");

if (auth.currentUser?.uid !== post.userId) {
  deleteBtn.style.display = "none";
}

deleteBtn.onclick = async () => {

  const confirmDelete = confirm("Delete this post?");
  if (!confirmDelete) return;

  await deletePost(post.id);

  div.remove();

};

});

});

}

loadPosts();


radiusInput.oninput=()=>{
radiusValue.innerText=radiusInput.value;
loadPosts();
};

</script>

</div>

<script type="module" src="./authController.js"></script>
<script type="module" src="./setup.js"></script>
</body>
